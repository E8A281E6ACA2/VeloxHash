name: Release Linux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }} package
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libuv1-dev libssl-dev libhwloc-dev

      - name: Build package
        run: ./scripts/package-release.sh --version "${GITHUB_REF_NAME:-dev}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: veloxhash-linux-${{ matrix.arch }}
          path: |
            dist/veloxhash-linux-${{ matrix.arch }}.tar.gz
            dist/veloxhash-*-linux-${{ matrix.arch }}.tar.gz

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/veloxhash-linux-${{ matrix.arch }}.tar.gz
            dist/veloxhash-*-linux-${{ matrix.arch }}.tar.gz
